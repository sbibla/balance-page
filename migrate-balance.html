<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Migrate Balance to Mika</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 4rem auto; padding: 1rem; }
    button { padding: 0.75rem 1.5rem; font-size: 1rem; background: #4a6fa5; color: white; border: none; border-radius: 8px; cursor: pointer; }
    #status { margin-top: 1.5rem; font-size: 1rem; line-height: 1.7; }
  </style>
</head>
<body>
  <h2>Migrate balance → Mika</h2>
  <p>Copies all transactions from the old shared balance (<code>appData/transactions</code>) into Mika's personal balance (<code>balanceData/{mikaHash}</code>).</p>
  <button onclick="migrate()">Run Migration</button>
  <div id="status"></div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getFirestore, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey:            "AIzaSyCep3erAzfctu24i8QDzC51yz5eZQ3XkvI",
      authDomain:        "bibla-balance-app.firebaseapp.com",
      projectId:         "bibla-balance-app",
      storageBucket:     "bibla-balance-app.firebasestorage.app",
      messagingSenderId: "833335006706",
      appId:             "1:833335006706:web:41ca8423aafce8579f876b"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    async function sha256(text) {
      var buffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
      return Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    window.migrate = async function () {
      var status = document.getElementById('status');
      status.textContent = 'Reading old transactions from appData/transactions...';

      var snap = await getDoc(doc(db, 'appData', 'transactions'));
      if (!snap.exists() || !snap.data().list || snap.data().list.length === 0) {
        status.textContent = 'No data found in appData/transactions. Nothing to migrate.';
        return;
      }

      var list = snap.data().list;
      var mikaHash = await sha256('mika');
      status.textContent = 'Writing ' + list.length + ' transactions to Mika (' + mikaHash.slice(0, 10) + '...)';

      await setDoc(doc(db, 'balanceData', mikaHash), { list: list });
      status.innerHTML = '✅ Done! ' + list.length + ' transaction(s) migrated to Mika.<br><small>You can now delete <code>appData/transactions</code> from the Firebase Console if you like.</small>';
    };
  </script>
</body>
</html>
