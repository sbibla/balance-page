<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Balance Page</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>Welcome to your Balance Page</h1>
    <p class="subtitle">Bibla Apps</p>
  </header>

  <main class="login-main">
    <section class="card login-card">
      <h2>Sign In</h2>

      <div class="login-form">
        <div class="login-field">
          <label for="login-username">Username</label>
          <input type="text" id="login-username" placeholder="Enter your username" autocomplete="username" />
        </div>
        <div class="login-field">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="6-digit PIN" maxlength="6" inputmode="numeric" />
        </div>
        <p class="login-error" id="login-error"></p>
        <button class="login-btn" onclick="handleLogin()">Sign In</button>
      </div>
    </section>
  </main>

  <footer>
    <p>Made by Saar Bibla &mdash; <span class="version">v0.102</span></p>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
