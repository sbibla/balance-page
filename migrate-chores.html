<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Migrate Chores to Mika</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 4rem auto; padding: 1rem; }
    button { padding: 0.75rem 1.5rem; font-size: 1rem; background: #4a6fa5; color: white; border: none; border-radius: 8px; cursor: pointer; }
    #status { margin-top: 1.5rem; font-size: 1rem; line-height: 1.7; }
  </style>
</head>
<body>
  <h2>Migrate chores → Mika</h2>
  <p>Click the button to copy chores from the old shared document to Mika's personal list.</p>
  <button onclick="migrate()">Run Migration</button>
  <div id="status"></div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getFirestore, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey:            "AIzaSyCep3erAzfctu24i8QDzC51yz5eZQ3XkvI",
      authDomain:        "bibla-balance-app.firebaseapp.com",
      projectId:         "bibla-balance-app",
      storageBucket:     "bibla-balance-app.firebasestorage.app",
      messagingSenderId: "833335006706",
      appId:             "1:833335006706:web:41ca8423aafce8579f876b"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    async function sha256(text) {
      var buffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
      return Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    window.migrate = async function () {
      var status = document.getElementById('status');
      status.textContent = '⏳ Reading old chores from choresData/main…';

      var snap = await getDoc(doc(db, 'choresData', 'main'));
      if (!snap.exists()) {
        status.textContent = '⚠️ No data found in choresData/main. Nothing to migrate.';
        return;
      }

      var data = snap.data();
      var mikaHash = await sha256('mika');
      status.textContent = '⏳ Writing to Mika's document (' + mikaHash.slice(0, 10) + '…)';

      // Strip out categories (now shared) — keep list and streak only
      var mikaData = { list: data.list || [] };
      if (data.streak) mikaData.streak = data.streak;

      await setDoc(doc(db, 'choresData', mikaHash), mikaData);
      status.innerHTML = '✅ Done! ' + (data.list ? data.list.length : 0) + ' chore(s) migrated to Mika.<br><small>You can now delete <code>choresData/main</code> from the Firebase Console if you like.</small>';
    };
  </script>
</body>
</html>
